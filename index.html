<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Autoservicio Victor</title>

    <link rel="stylesheet" href="style.css?v=31">

    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>

<div class="app">

    <header class="topbar">
        <div class="brand">
            <div class="logo">📦</div>
            <div>
                <h1>INVENTARIO</h1>
                <p>AUTOSERVICIO VICTOR</p>
            </div>
        </div>

        <label class="excel-btn">
            📄 Excel
            <input type="file" id="excelFile" accept=".xlsx,.xls">
        </label>
    </header>

    <main class="screen">

        <section class="top-cards">
            <div class="top-card">
                <span>Excel</span>
                <strong id="estadoExcelNumero">-</strong>
            </div>

            <div class="top-card">
                <span>Escaneados</span>
                <strong id="contadorTop">0</strong>
            </div>
        </section>

        <p id="estadoExcel" class="estado-excel">No hay Excel cargado</p>

        <section class="section">
            <h2>UBICACIÓN SELECCIONADA</h2>
            <div class="location-grid">
                <button id="btnSalon" class="location-btn active">🏪 SALÓN</button>
                <button id="btnDeposito" class="location-btn">📦 DEPÓSITO</button>
            </div>
        </section>

        <section class="section camera-section">
            <div class="section-title-row">
                <h2>CÁMARA</h2>
                <span id="estadoCamaraTexto">Detenida</span>
            </div>

            <div class="camera-box">
                <video id="video" autoplay muted playsinline></video>
                <div class="scan-line"></div>
            </div>

            <div class="camera-actions">
                <button id="btnIniciarCamara" class="camera-btn">📷 Iniciar</button>
                <button id="btnDetenerCamara" class="camera-btn" disabled>■ Detener</button>
            </div>
        </section>

        <section id="productoCard" class="product-card idle">
            <div class="product-header">
                <h2 id="tituloProducto">PRODUCTO</h2>
                <span id="estadoProducto">Esperando</span>
            </div>

            <p class="small-label">Código</p>
            <p id="codigoProducto" class="product-code">-</p>

            <p class="small-label">Artículo</p>
            <p id="nombreProducto" class="product-name">Esperando escaneo...</p>

            <div class="stock-grid">
                <div>
                    <span>Salón</span>
                    <strong id="stockSalon">0</strong>
                </div>
                <div>
                    <span>Depósito</span>
                    <strong id="stockDeposito">0</strong>
                </div>
                <div>
                    <span>Total</span>
                    <strong id="stockTotal">0</strong>
                </div>
            </div>
        </section>

        <section class="quantity-card">
            <h2>CANTIDAD A CARGAR EN <span id="ubicacionTexto">SALÓN</span></h2>

            <input type="number" id="cantidadInput" min="1" step="1" placeholder="Ingresar cantidad">

            <button id="btnGuardarCantidad" disabled>✔ Guardar cantidad</button>
        </section>

        <section class="action-grid">
            <button id="btnDeshacer" class="undo-btn" disabled>↩ Deshacer último</button>
            <button id="btnDescargar" class="download-btn" disabled>⬇ Descargar Excel</button>
        </section>

        <section class="history-section">
            <h2>ÚLTIMOS PRODUCTOS CARGADOS</h2>
            <ul id="historial"></ul>
        </section>

        <p id="mensaje"></p>

    </main>

</div>

<script type="module" src="./app.js?v=31"></script>
</body>
</html>
