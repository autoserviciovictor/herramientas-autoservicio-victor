<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Autoservicio Victor</title>

    <link rel="stylesheet" href="./style.css?v=30">

    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>

<div class="app">

    <header class="header">
        <div class="header-title">
            <div class="logo">📦</div>
            <div>
                <h1>INVENTARIO</h1>
                <p>AUTOSERVICIO VICTOR</p>
            </div>
        </div>

        <label class="excel-btn">
            📄 Excel
            <input type="file" id="excelFile" accept=".xlsx,.xls">
        </label>
    </header>

    <main class="main">

        <section class="top-status">
            <div>
                <span>Excel</span>
                <strong id="estadoExcel">No cargado</strong>
            </div>

            <div>
                <span>Escaneados</span>
                <strong id="contador">0</strong>
            </div>
        </section>

        <section class="section">
            <h2>UBICACIÓN SELECCIONADA</h2>

            <div class="selector">
                <button id="btnSalon" class="activo">🏪 SALÓN</button>
                <button id="btnDeposito">📦 DEPÓSITO</button>
            </div>
        </section>

        <section class="section">
            <h2>CÁMARA</h2>

            <div class="camera-box">
                <video id="video" autoplay muted playsinline></video>
                <div class="scan-line"></div>
            </div>

            <div class="selector">
                <button id="btnIniciarCamara">📷 Iniciar</button>
                <button id="btnDetenerCamara" disabled>■ Detener</button>
            </div>
        </section>

        <section id="productoCard" class="producto-card">
            <h2 id="tituloProducto">PRODUCTO ENCONTRADO</h2>

            <p class="label">Código</p>
            <p id="codigoProducto" class="codigo">-</p>

            <p class="label">Artículo</p>
            <p id="nombreProducto" class="articulo">Esperando escaneo...</p>

            <div class="stock-grid">
                <div>
                    <span>Salón</span>
                    <strong id="stockSalon">0</strong>
                </div>

                <div>
                    <span>Depósito</span>
                    <strong id="stockDeposito">0</strong>
                </div>

                <div>
                    <span>Total</span>
                    <strong id="stockTotal">0</strong>
                </div>
            </div>
        </section>

        <section class="cantidad-card">
            <h2>CANTIDAD A CARGAR EN <span id="ubicacionTexto">SALÓN</span></h2>

            <input
                type="number"
                id="cantidadInput"
                min="1"
                step="1"
                inputmode="numeric"
                placeholder="Ingresar cantidad"
            >

            <button id="btnGuardarCantidad" disabled>✔ Guardar cantidad</button>
        </section>

        <section class="acciones-grid">
            <button id="btnDeshacer" disabled>↩ Deshacer último</button>
            <button id="btnDescargar" disabled>⬇ Descargar Excel</button>
        </section>

        <section class="historial-card">
            <h2>ÚLTIMOS PRODUCTOS CARGADOS</h2>
            <ul id="historial"></ul>
        </section>

        <p id="mensaje"></p>

    </main>

</div>

<script type="module" src="./app.js?v=30"></script>
</body>
</html>
