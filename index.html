<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Autoservicio Victor</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>
<body>

    <header>
        <h1>📦 Inventario</h1>
        <p>Autoservicio Victor</p>
    </header>

    <main>

        <section class="card">
            <h2>1. Cargar Excel</h2>
            <input type="file" id="excelFile" accept=".xlsx,.xls">
            <p id="estadoExcel">No hay Excel cargado</p>
        </section>

        <section class="card">
            <h2>2. Elegir ubicación</h2>

            <div class="botones">
                <button id="btnSalon" class="activo">Salón</button>
                <button id="btnDeposito">Depósito</button>
            </div>

            <p id="estadoUbicacion">Ubicación seleccionada: Salón</p>
        </section>

        <section class="card">
            <h2>3. Cámara</h2>

            <video id="video" autoplay muted playsinline></video>

            <div class="botones">
                <button id="btnIniciarCamara">📷 Iniciar cámara</button>
                <button id="btnDetenerCamara" disabled>❌ Detener cámara</button>
            </div>
        </section>

        <section class="card producto">
            <h2>Producto encontrado</h2>

            <p class="label">Código</p>
            <p id="codigoProducto" class="dato">-</p>

            <p class="label">Artículo</p>
            <p id="nombreProducto" class="dato grande">Esperando escaneo...</p>

            <p class="label">Stock actual</p>
            <p id="stockProducto" class="dato">-</p>

            <label for="cantidadInput">Cantidad</label>
            <input type="number" id="cantidadInput" min="1" step="1" placeholder="Ingresar cantidad">

            <button id="btnGuardarCantidad" disabled>Guardar cantidad</button>
        </section>

        <section class="card resumen">
            <h2>Resumen</h2>

            <p>Productos cargados: <strong id="contador">0</strong></p>

            <div class="botones">
                <button id="btnDeshacer" disabled>↩️ Deshacer último</button>
                <button id="btnDescargar" disabled>📥 Descargar Excel</button>
            </div>
        </section>

        <section class="card">
            <h2>Últimos cargados</h2>
            <ul id="historial"></ul>
        </section>

        <p id="mensaje"></p>

    </main>

    <script type="module" src="app.js?v=1"></script>
</body>
</html>
