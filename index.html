<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Autoservicio Victor</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
</head>

<body>

    <h1>📦 Stock Autoservicio Victor</h1>

    <div>
        <h3>1. Cargar Excel</h3>
        <input type="file" id="excelFile" accept=".xlsx,.xls">
    </div>

    <hr>

    <div>
        <h3>2. Ubicación del stock</h3>

        <label>
            <input type="radio" name="modo" value="salon" checked>
            Salón
        </label>

        <label style="margin-left:20px;">
            <input type="radio" name="modo" value="deposito">
            Depósito
        </label>
    </div>

    <hr>

    <div>
        <h3>3. Escanear producto</h3>

        <button id="iniciarCamaraBtn">
            📷 Iniciar Cámara
        </button>

        <button id="detenerCamaraBtn">
            ❌ Detener Cámara
        </button>

        <br><br>

        <video
            id="video"
            width="100%"
            style="
                max-width:450px;
                border:2px solid #ccc;
                border-radius:10px;
            ">
        </video>

        <br><br>

        <input
            type="text"
            id="codigo"
            placeholder="Código de barras"
            style="width:250px;"
        >

        <button id="buscarBtn">
            Buscar Manualmente
        </button>
    </div>

    <hr>

    <div>
        <h3>Producto encontrado</h3>

        <p id="producto">
            Esperando escaneo...
        </p>
    </div>

    <hr>

    <div>
        <h3>Cantidad</h3>

        <input
            type="number"
            id="cantidad"
            placeholder="Cantidad"
        >

        <button id="guardarBtn">
            Guardar
        </button>
    </div>

    <hr>

    <div>
        <button id="descargarBtn">
            📥 Descargar Excel Actualizado
        </button>
    </div>

    <script src="app.js?v=30"></script>

</body>
</html>
